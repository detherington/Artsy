name: Artsy
options:
  bundleIdPrefix: com.artsy
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

targets:
  Artsy:
    type: application
    platform: macOS
    sources:
      - path: Artsy
    settings:
      base:
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: Artsy/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.artsy.app
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        METAL_LIBRARY_OUTPUT_DIR: "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)"
        MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Artsy/App/Artsy.entitlements
      properties:
        com.apple.security.app-sandbox: false

  ArtsyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ArtsyTests
    dependencies:
      - target: Artsy
    settings:
      base:
        SWIFT_VERSION: "5.9"
